<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SiteFotos Ops Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div class="max-w-7xl mx-auto p-3 sm:p-6">
      <header class="mb-6">
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 sm:gap-4 mb-3">
          <div>
            <h1 class="text-2xl font-semibold tracking-tight">SiteFotos Ops Dashboard</h1>
            <p id="subtitle" class="text-slate-300 text-sm">Loading…</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <div id="periodBtns" class="flex flex-wrap items-center gap-1"></div>
            <button id="refreshBtn" class="px-3 py-2 rounded bg-slate-800 hover:bg-slate-700 text-sm">Refresh view</button>
          </div>
        </div>
        <div id="regionBtns" class="flex flex-wrap items-center gap-1"></div>
      </header>

      <div id="grid" class="space-y-4"></div>

      <footer class="mt-8 text-xs text-slate-400">
        <div>Tip: bookmark <span class="font-mono">http://localhost:4545</span></div>
      </footer>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
