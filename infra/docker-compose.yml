services:
  dashboard:
    build:
      context: ../dashboard
    restart: unless-stopped
    command: ["sh","-c","mkdir -p /data && touch /data/app.db && npx prisma db push && npm run start"]
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/app.db
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      AGENT_TOKEN: ${AGENT_TOKEN}
      ALLSITE_CENTRAL_HUB_URL: ${ALLSITE_CENTRAL_HUB_URL}
    volumes:
      - dashboard_data:/data

  worker:
    build:
      context: ../dashboard
    restart: unless-stopped
    command: ["sh","-c","mkdir -p /data && touch /data/app.db && npx prisma db push && node worker/worker.mjs"]
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/data/app.db
      DEPLOY_COMPOSE_PATH: /infra
      WORKER_ID: vps-worker
      REPO_DIR: /repo
      GIT_PULL: "1"
    volumes:
      - dashboard_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - ./:/infra
      - ../:/repo

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL}
      DASHBOARD_HOST: ${DASHBOARD_HOST}
      ALLSITE_HUB_HOST: ${ALLSITE_HUB_HOST}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - dashboard
      - worker

  allsitehub:
    build:
      context: ../allsitehub
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4545
      UPDATE_MIN_INTERVAL_SECONDS: ${UPDATE_MIN_INTERVAL_SECONDS:-60}
      UPDATE_MAX_SECONDS: ${UPDATE_MAX_SECONDS:-180}
      SITEFOTOS_API_KEY: ${SITEFOTOS_API_KEY}
      SITEFOTOS_ACCESS_CODE: ${SITEFOTOS_ACCESS_CODE}
      SITEFOTOS_API_BASE_URL: ${SITEFOTOS_API_BASE_URL}
      SITEFOTOS_API_BEARER: ${SITEFOTOS_API_BEARER}
      SUBMISSION_DETAIL_LIMIT: ${SUBMISSION_DETAIL_LIMIT:-25}
      SUBMISSION_DETAIL_SLEEP_MS: ${SUBMISSION_DETAIL_SLEEP_MS:-75}
      ENABLE_IMAGE_HEAD_CHECKS: ${ENABLE_IMAGE_HEAD_CHECKS:-false}
    volumes:
      - allsitehub_data:/app/data

volumes:
  dashboard_data:
  caddy_data:
  caddy_config:
  allsitehub_data:
